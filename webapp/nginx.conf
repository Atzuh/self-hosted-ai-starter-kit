server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Browsers eisen een geldig JS-MIME type voor ES-module imports (zoals de
    # pdf.js worker). De default nginx mime.types kent .mjs niet, dus we
    # mappen hem expliciet via default_type binnen een location-match.
    location ~* \.mjs$ {
        default_type text/javascript;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # ---------------------------------------------------------
    # Gegenereerde aktes uit de shared-volume (read-only mount)
    # Beschikbaar op http://host/output/<bestand>
    # Een GET op /output/ levert een JSON-listing (autoindex) die de
    # webapp gebruikt voor de "Recente aktes"-lijst.
    # ---------------------------------------------------------
    location /output/ {
        alias /shared/output/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
    }

    # Optioneel: inspecteer andere shared bestanden (handig bij debuggen)
    location /files/ {
        alias /shared/;
        autoindex on;
        add_header Access-Control-Allow-Origin *;
    }

    # ---------------------------------------------------------
    # React single-page app met client-side routing fallback
    # ---------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Access-Control-Allow-Origin *;
    }

    # Lange cache voor gehashte assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
